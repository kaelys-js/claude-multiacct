# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json
# Managed by kaelys-js-infra (terraform/repository_files.tf).
name: Bug report
description: File a bug against claude-multiacct
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in every required field — sparse
        reports are hard to act on for a personal Mac-side tool where
        state on your machine matters more than the code.
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      description: "Output of `sw_vers -productVersion`"
      placeholder: "15.2"
    validations:
      required: true
  - type: input
    id: claude-desktop-version
    attributes:
      label: Claude Desktop version
      description: >
        Output of `defaults read
        /Applications/Claude.app/Contents/Info CFBundleShortVersionString`
      placeholder: "1.2.3"
    validations:
      required: true
  - type: input
    id: mirror-label
    attributes:
      label: Mirror instance label (if applicable)
      description: >
        The label passed to `claude-multiacct add-instance <label>`;
        leave blank if the bug is on the primary.
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `claude-multiacct ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: textarea
    id: doctor-output
    attributes:
      label: doctor --json output (if a mirror is involved)
      description: "`claude-multiacct doctor --json | jq`"
      render: json
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: launchd logs, terminal output, etc.
      render: shell
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
    validations:
      required: false
