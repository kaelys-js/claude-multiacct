# Force people to pick a template — reduces the "help wanted" issues that
# would be better as Discussions.
blank_issues_enabled: false

contact_links:
  - name: Ask a question / share a use case
    url: https://github.com/kaelys-js/claude-multiacct/discussions
    about: Use Discussions for questions, ideas, and show-and-tell.
  - name: Report a security issue
    url: https://github.com/kaelys-js/claude-multiacct/security/advisories/new
    about: >
      Please report vulnerabilities privately, not as public issues.
