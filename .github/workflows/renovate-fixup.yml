# yaml-language-server: $schema=../../.schemas/github-workflow.json
# renovate-fixup — regenerate CI-checked derived files on Renovate PRs and
# push the fix back to the PR branch so CI regreens. Runs BEFORE the CI's
# `sync` and `format` jobs would fail on drift Renovate's own container
# cannot regenerate.
#
# What this repo actually needs regenerated after a Renovate bump:
#   - mise.toml pnpm pin + mise.lock (Renovate's "npm dev dependencies"
#     grouping bumps `engines.pnpm` + `packageManager` in package.json without
#     touching mise.toml, so this workflow mirrors package.json's
#     `engines.pnpm` into `mise.toml` and re-locks. Without this, mise-provided
#     pnpm 11.x runs against a package.json pinning pnpm 11.y, and .npmrc's
#     `manage-package-manager-versions=true` triggers a broken auto-download of
#     the mismatched version into `~/Library/pnpm/store` — first line reads
#     "This file intentionally left blank" and exec fails with
#     `pnpm: line 1: This: command not found`, exit 127).
#   - pnpm-lock.yaml (Renovate sometimes only rewrites package.json / mise.toml
#     without a workspace install; a follow-up `pnpm install --lockfile-only`
#     recomputes the lockfile). Uses `./bin/mise` to invoke pnpm through the
#     vendored mise wrapper — same shape every other job uses.
#   - `pnpm sync` outputs (versions.ts + turbo.ts + schemas.ts). These
#     regenerate `versions.json` / `turbo.json` / product JSON schemas from
#     typed sources — CI runs `pnpm sync:check` and fails on drift.
#   - Repo formatters (`pnpm format` — oxfmt + taplo + syncpack). Formatter
#     version bumps or a package.json edit can shift canonical output.
#
# Not regenerated here:
#   - Test snapshots / governance records — hand-authored artefacts a Renovate
#     bump shouldn't touch. A break signals a real change to review.
#
# Loop protection: only commits when the working tree has drift after the
# regeneration steps. A clean tree exits silently — this workflow cannot
# infinite-loop against itself.
#
# Auth: mints a short-lived GitHub App installation token via
# actions/create-github-app-token (same App as Renovate uses for its own
# commits — kaelys-js-renovate[bot]) so the fixup commit's author matches
# every other Renovate commit on the PR and DCO stays happy.
name: renovate-fixup

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

# Same concurrency group per PR so a rapid-fire synchronize doesn't stack
# fixups on top of each other. Only fires on pull_request events, so the
# per-PR key never collides with main-branch pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Workflow-level least privilege: read-only. The fixup job pushes via the
# App token (minted below), not GITHUB_TOKEN, so contents: read is enough.
permissions:
  contents: read
  pull-requests: read

env:
  CI: "true" # pnpm 11: allow non-interactive node_modules rebuild

jobs:
  preflight:
    name: preflight
    # Decide the runner for every downstream job. Runs on the same
    # SELF_HOSTED_ENABLED selection the real jobs used before, so the decider
    # itself always lands on a runner this repo can actually provision: the
    # self-hosted kaelys-mac-mini where SELF_HOSTED_ENABLED is set (the private
    # repos, where GitHub-hosted runners are spending-limit-blocked), else
    # GitHub-hosted ubuntu-latest (the public repos with free hosted minutes).
    # Pinning this job to ubuntu-latest would fail to start on the private
    # repos and skip the whole pipeline.
    #
    # Hosted-first policy: query the account's GitHub Actions billing usage for
    # the current month; the post-discount netAmount summed over the `actions`
    # product stays 0 while included minutes remain and goes positive once
    # overage is billed. netAmount == 0 -> runs_on "ubuntu-latest" (hosted);
    # otherwise the free kaelys-mac-mini self-hosted runner. The step can never
    # fail the job: it defaults to self-hosted and only flips to hosted on an
    # explicit confirmation, always writing an output and exiting 0. hosted_ok
    # mirrors the decision as a boolean for jobs whose hosted runner is not
    # ubuntu-latest (e.g. macOS). See docs/self-hosted-runner.md in
    # kaelys-js-infra for the fleet-wide rationale.
    runs-on: ${{ vars.SELF_HOSTED_ENABLED == 'true' && fromJSON('["self-hosted","kaelys-mac-mini"]') || 'ubuntu-latest' }}
    timeout-minutes: 5
    outputs:
      runs_on: ${{ steps.pick.outputs.runs_on }}
      hosted_ok: ${{ steps.pick.outputs.hosted_ok }}
    steps:
      - name: Select runner by remaining GitHub-hosted minutes
        id: pick
        env:
          BILLING_READ_TOKEN: ${{ secrets.BILLING_READ_TOKEN }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
          SH_ENABLED: ${{ vars.SELF_HOSTED_ENABLED }}
        run: |
          # GitHub invokes this step with `bash -e`; clear every abort-on-error
          # flag so no command can fail the job. A preflight that exits non-zero
          # would skip every downstream job (needs: preflight) and block the PR,
          # so this step MUST always emit a runs_on and exit 0. Default to the
          # free self-hosted runner; only an explicit confirmation flips it.
          set +e
          set +u
          set +o pipefail
          SELF_HOSTED='["self-hosted","kaelys-mac-mini"]'
          HOSTED='"ubuntu-latest"'
          RUNS_ON="$SELF_HOSTED"
          HOSTED_OK=false
          finish() {
            {
              echo "runs_on=${RUNS_ON}"
              echo "hosted_ok=${HOSTED_OK}"
            } >> "$GITHUB_OUTPUT" 2>/dev/null
            echo "preflight selected: ${RUNS_ON} (hosted_ok=${HOSTED_OK})"
          }
          # Runs on ANY exit, including an unexpected crash, so an output is
          # always written.
          trap finish EXIT
          # Fork PRs cannot use self-hosted runners (GitHub refuses to run fork
          # code on them) and never receive repo secrets, so GitHub-hosted
          # ubuntu is both the only option and the secure one. Also covers a
          # missing token. This is the one non-billing path that goes hosted.
          if [ "${IS_FORK:-}" = "true" ] || [ -z "${BILLING_READ_TOKEN:-}" ]; then
            RUNS_ON="$HOSTED"
            HOSTED_OK=true
            echo "fork PR or no billing token; using GitHub-hosted ubuntu-latest"
            exit 0
          fi
          # If SELF_HOSTED_ENABLED is set, the operator has pinned this repo to
          # the self-hosted mini because GitHub-hosted runners are blocked or
          # undesired here — on these private repos the account's hosted-runner
          # spending limit is reached and hosted jobs fail to start ("The job
          # was not started because ... your spending limit needs to be
          # increased"). Hosted is not a safe target regardless of what billing
          # reports, so stay on the free self-hosted runner. The billing branch
          # below governs repos where hosted IS available (e.g. public repos
          # with free hosted minutes).
          if [ "${SH_ENABLED:-}" = "true" ]; then
            echo "SELF_HOSTED_ENABLED set; GitHub-hosted runners unavailable here — using self-hosted"
            exit 0
          fi
          year="$(date -u +%Y 2>/dev/null)"
          month="$(date -u +%-m 2>/dev/null)"
          [ -n "${year:-}" ] || { echo "date failed; keeping self-hosted"; exit 0; }
          resp="$(curl -sS -m 30 -w '\n%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${BILLING_READ_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/users/kaelys-js/settings/billing/usage?year=${year}&month=${month}" \
            2>/dev/null)"
          code="$(printf '%s' "${resp:-}" | tail -n1)"
          body="$(printf '%s' "${resp:-}" | sed '$d')"
          if [ "${code:-}" != "200" ]; then
            echo "billing HTTP '${code:-none}'; keeping self-hosted"
            exit 0
          fi
          if ! printf '%s' "${body:-}" | jq -e '.usageItems | type == "array"' >/dev/null 2>&1; then
            echo "billing response has no usageItems[]; keeping self-hosted"
            exit 0
          fi
          net="$(printf '%s' "${body}" | jq -r '[.usageItems[] | select(.product == "actions") | (.netAmount // 0)] | add // 0' 2>/dev/null)"
          if ! printf '%s' "${net:-}" | grep -Eq '^-?[0-9]+([.][0-9]+)?$'; then
            echo "unparsable actions netAmount '${net:-}'; keeping self-hosted"
            exit 0
          fi
          if awk -v n="${net}" 'BEGIN { exit !(n + 0 > 0) }'; then
            echo "actions netAmount=${net} > 0 — included minutes exhausted; using self-hosted"
          else
            RUNS_ON="$HOSTED"
            HOSTED_OK=true
            echo "actions netAmount=${net} == 0 — within included minutes; using hosted"
          fi
          exit 0
  fixup:
    name: regenerate derived files (Renovate PRs only)
    # Only run for PRs opened by our Renovate GitHub App bot, on same-repo
    # branches (fork PRs don't get secrets anyway).
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == 'kaelys-js-renovate[bot]'
    needs: preflight
    runs-on: ${{ fromJSON(needs.preflight.outputs.runs_on) }}
    timeout-minutes: 15
    steps:
      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RENOVATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Check out PR head (using App token so the eventual push retriggers CI)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          # Full history so `git commit` doesn't complain about a shallow clone.
          fetch-depth: 0

      # Same toolchain shape every CI job in this repo uses: vendored bin/mise
      # wrapper + restored .mise cache. Keeps fixup's environment byte-identical
      # to what the CI jobs it's fixing up will run under next.
      - name: Restore mise toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml', 'mise.lock') }}

      - name: Expose vendored mise on PATH
        run: |
          ./bin/mise --version >/dev/null 2>&1 || true
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(ls "$PWD"/.mise/mise-* | head -n1)" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install toolchain
        run: ./bin/mise install

      # If Renovate bumped package.json's `engines.pnpm` / `packageManager`
      # without also bumping `mise.toml [tools] pnpm`, mise-provided pnpm is
      # older than the version package.json advertises. .npmrc has
      # `manage-package-manager-versions=true`, so the older pnpm sees the
      # newer packageManager field and auto-downloads the requested version
      # into `~/Library/pnpm/store` — that download is a placeholder file
      # (`This file intentionally left blank`) and the next invocation dies
      # with `pnpm: line 1: This: command not found`. Fix: mirror
      # `engines.pnpm` into mise.toml, refresh mise.lock, install the new
      # pnpm through mise (fetches from GitHub releases via aqua, not the
      # broken npm auto-download path). No-op when versions already match.
      - name: Sync mise.toml pnpm pin from package.json engines.pnpm
        run: |
          set -euo pipefail
          PKG_PNPM=$(node -e "const p=require('./package.json'); process.stdout.write(p.engines && p.engines.pnpm ? p.engines.pnpm : '')")
          if [ -z "$PKG_PNPM" ]; then
            echo "renovate-fixup: package.json has no engines.pnpm — nothing to mirror."
            exit 0
          fi
          MISE_PNPM=$(awk -F'"' '/^pnpm = "/ { print $2; exit }' mise.toml)
          if [ "$PKG_PNPM" = "$MISE_PNPM" ]; then
            echo "renovate-fixup: mise.toml pnpm ($MISE_PNPM) already matches package.json engines.pnpm ($PKG_PNPM) — no drift."
            exit 0
          fi
          echo "renovate-fixup: mirroring package.json engines.pnpm ($PKG_PNPM) into mise.toml (was $MISE_PNPM)."
          awk -v v="$PKG_PNPM" '
            /^pnpm = "/ && !done { print "pnpm = \"" v "\""; done=1; next }
            { print }
          ' mise.toml > mise.toml.new
          mv mise.toml.new mise.toml
          # mise.lock has `lockfile = true` in mise.toml settings, so
          # `mise install` refuses a version whose SHA isn't recorded. Force
          # the install for pnpm (fetches from aqua, computes fresh hash),
          # then run `mise lock` to persist the new checksums into mise.lock.
          ./bin/mise install --force pnpm
          ./bin/mise lock

      - name: Regenerate pnpm lockfile (in case package.json changed)
        run: ./bin/mise exec -- pnpm install --lockfile-only

      - name: Install deps for sync/format scripts
        run: ./bin/mise exec -- pnpm install --frozen-lockfile

      - name: Regenerate versions.json / turbo.json / product schemas
        run: ./bin/mise exec -- pnpm run sync

      - name: Reformat repo files (oxfmt + taplo + syncpack)
        run: ./bin/mise exec -- pnpm run format

      - name: Commit + push if there's drift
        env:
          # This bot's identity — matches Renovate's own commits so DCO stays happy.
          BOT_NAME: "kaelys-js-renovate[bot]"
          BOT_EMAIL: "304942767+kaelys-js-renovate[bot]@users.noreply.github.com"
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "renovate-fixup: no drift — all derived files already in sync."
            exit 0
          fi
          echo "renovate-fixup: drift detected in these files:"
          git status --porcelain
          git config user.name "$BOT_NAME"
          git config user.email "$BOT_EMAIL"
          git add -A
          ./bin/mise exec -- git commit \
            --signoff \
            --message "chore(deps): regenerate derived files for this bump" \
            --message "Follow-on to the Renovate bump on this PR. pnpm-lock.yaml,
          sync outputs (versions.json / turbo.json / product schemas), and
          repo-file formatters (oxfmt + taplo + syncpack) are deterministic
          outputs of the pinned toolchain — Renovate can't run the
          regeneration inside its own container, so renovate-fixup.yml runs
          it here and pushes the result back.

          Co-Authored-By: Claude Opus 4.7 <noreply@anthropic.com>"
          ./bin/mise exec -- git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
