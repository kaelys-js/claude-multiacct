# yaml-language-server: $schema=../../.schemas/github-workflow.json
# Generated by `pnpm sync-upstream:opt-in` from
# `packages/shared/config/workflows/sync-upstream.same-owner.template.yml`.
# Regenerate after changing `.sync-upstream.json` or the template; a
# hand edit here is preserved (the CLI exits with conflict) until you
# rerun with `--force`.
# SPDX-FileCopyrightText: 2026 TTT Studios
# SPDX-License-Identifier: LicenseRef-Proprietary
#
# Template for a fork's daily auto-merge of its upstream mirror into `main`
# WHEN the fork and the upstream sit under the SAME GitHub account. GitHub
# enforces global-per-account uniqueness on deploy-key material, so the
# cross-owner "same key installed on both repos" pattern is refused with
# `key is already in use` in this topology. This variant carries no deploy
# key at all: both remotes ride HTTPS with a repo-scoped personal access
# token (`secrets.GH_TOKEN`, `repo` + `workflow` scope on the account).
#
# Consumed by `pnpm sync-upstream:opt-in` when `.sync-upstream.json` sets
# `"mode": "same-owner"`. Two placeholders are substituted on write:
#
#   UPSTREAM_REPO_PATH — owner/repo of the upstream, e.g.
#                        `kaelys-js/foundation-registry`. Derived by the CLI
#                        from `upstreamRepoSsh` (`git@github.com:<path>.git`).
#   UPSTREAM_BRANCH    — the upstream branch to track, e.g. `main`.
#
# Substitution is a literal ${NAME} string-replace; GHA's own ${{ ... }}
# expressions pass through untouched because the outer braces do not match
# a placeholder start. The lines that reach for the token look like
# `${{ secrets.GH_TOKEN }}` in both the template and the generated file —
# same-owner hardcodes GH_TOKEN as the secret name, so there is no
# deploy-key placeholder here (unlike the cross-owner template).
#
# The template intentionally omits the yaml-language-server schema-ref line —
# the CLI prepends the correct ref for the OUTPUT location on write, so the
# template file itself is not schema-checked (its own path differs from
# where the generated file lands and the ref would resolve to nowhere).
#
# Token setup sequence (do this once per fork before enabling):
#
#   1. On the same GitHub account that owns both repos, create a classic
#      PAT (`repo` + `workflow` scope) or a fine-grained PAT with
#      `Contents: read/write` + `Pull requests: read/write` on this fork
#      AND `Contents: read` on the upstream.
#   2. Store the token as the repo secret `GH_TOKEN` on the fork.
#   3. Nothing on the upstream side — HTTPS reads under the same account
#      are already authorised by the token.
#
# What the workflow does at run time:
#
#   1. Checkout `main` with fetch-depth 0 using `GH_TOKEN` (read of upstream
#      + write of fork under the same account).
#   2. Add the HTTPS `upstream` remote (token embedded via
#      `x-access-token`) and fetch the tracked branch.
#   3. Try fast-forward. On success, PATCH the fork's `main` ref via
#      `gh api` so the ref points at the upstream tip; no new commit is
#      created, and upstream commit signatures are preserved verbatim.
#   4. On non-fast-forward: cut branch
#      `sync/upstream-YYYY-MM-DD-<sha>-<run_id>` (the run id keeps every
#      attempt unique so the push is always a plain create — the repo's
#      `non_fast_forward` ruleset matches `sync/**` and refuses any
#      force-update, so a reused name + force-push is a hard 422), merge
#      with a fixed rule (upstream wins under `packages/shared` and
#      `.schemas`; product code and product-specific workflows win locally),
#      then plain-`git push` the branch. There is NO API re-signing step:
#      `main` only requires signatures on the commit that lands on it, and
#      the squash-merge commit GitHub creates on `main` is web-flow-signed
#      and Verified. The PR opens, squash auto-merge with branch delete is
#      enabled. If the resolution comes out byte-identical to the fork tip
#      (nothing to sync), the merge step exits 0 as a clean no-op and no PR
#      is opened.
#   5. If a merged path outside the two allowlists conflicts, the commit
#      lands with conflict markers (prefixed `[CONFLICT] ` in git log). A
#      post-push `git grep` scan on HEAD detects those markers and gates
#      the auto-merge step: on a hit the PR opens with a
#      `[NEEDS HUMAN REVIEW - DO NOT AUTO-MERGE]` title prefix, a
#      `sync-upstream-conflict` label, and a comment listing the affected
#      files; auto-merge is NOT enabled and the workflow exits nonzero.
#      The reviewer resolves the PR by hand.
#
# The guard step (`Scan sync branch for conflict markers`) is what stops
# PR #33 (kaelys-js/ttt-studio-cole-30-60-90-plan, 2026-07-17) from
# happening again: the earlier design ran the marker check only inside
# an `if !` branch that fires when `gh pr merge --auto` fails, but on a
# fork without required checks `--auto` returns 0 (auto-merge enabled)
# and the check never ran, so a dirty tree got squash-merged into main.
# The current design runs the check unconditionally before any `gh pr
# merge` call, and downstream merge steps are gated on its output.

name: sync-upstream

on:
  schedule:
    - cron: "0 10 * * *" # every day 10:00 UTC (03:00 America/Los_Angeles under PT)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip remote mutations (ref PATCH, branch push, PR create/merge, label/comment). Local merge still runs. Used by kaelys-js-infra/scripts/audit-scheduled.sh via `act workflow_dispatch --input dry_run=true`."
        type: boolean
        default: false

concurrency:
  group: sync-upstream
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  # `inputs.dry_run` is only populated on workflow_dispatch; the scheduled
  # cron path leaves it empty and behaves as before. Explicit string compare
  # against 'true' downstream so schedule stays on the mutating branch.
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

jobs:
  preflight:
    name: preflight
    # Decide the runner for every downstream job. Runs on the same
    # SELF_HOSTED_ENABLED selection the real jobs used before, so the decider
    # itself always lands on a runner this repo can actually provision: the
    # self-hosted kaelys-mac-mini where SELF_HOSTED_ENABLED is set (the private
    # repos, where GitHub-hosted runners are spending-limit-blocked), else
    # GitHub-hosted ubuntu-latest (the public repos with free hosted minutes).
    # Pinning this job to ubuntu-latest would fail to start on the private
    # repos and skip the whole pipeline.
    #
    # Hosted-first policy: query the account's GitHub Actions billing usage for
    # the current month; the post-discount netAmount summed over the `actions`
    # product stays 0 while included minutes remain and goes positive once
    # overage is billed. netAmount == 0 -> runs_on "ubuntu-latest" (hosted);
    # otherwise the free kaelys-mac-mini self-hosted runner. The step can never
    # fail the job: it defaults to self-hosted and only flips to hosted on an
    # explicit confirmation, always writing an output and exiting 0. hosted_ok
    # mirrors the decision as a boolean for jobs whose hosted runner is not
    # ubuntu-latest (e.g. macOS). See docs/self-hosted-runner.md in
    # kaelys-js-infra for the fleet-wide rationale.
    runs-on: ${{ vars.SELF_HOSTED_ENABLED == 'true' && fromJSON('["self-hosted","kaelys-mac-mini"]') || 'ubuntu-latest' }}
    timeout-minutes: 5
    outputs:
      runs_on: ${{ steps.pick.outputs.runs_on }}
      hosted_ok: ${{ steps.pick.outputs.hosted_ok }}
    steps:
      - name: Select runner by remaining GitHub-hosted minutes
        id: pick
        env:
          BILLING_READ_TOKEN: ${{ secrets.BILLING_READ_TOKEN }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
          SH_ENABLED: ${{ vars.SELF_HOSTED_ENABLED }}
        run: |
          # GitHub invokes this step with `bash -e`; clear every abort-on-error
          # flag so no command can fail the job. A preflight that exits non-zero
          # would skip every downstream job (needs: preflight) and block the PR,
          # so this step MUST always emit a runs_on and exit 0. Default to the
          # free self-hosted runner; only an explicit confirmation flips it.
          set +e
          set +u
          set +o pipefail
          SELF_HOSTED='["self-hosted","kaelys-mac-mini"]'
          HOSTED='"ubuntu-latest"'
          RUNS_ON="$SELF_HOSTED"
          HOSTED_OK=false
          finish() {
            {
              echo "runs_on=${RUNS_ON}"
              echo "hosted_ok=${HOSTED_OK}"
            } >> "$GITHUB_OUTPUT" 2>/dev/null
            echo "preflight selected: ${RUNS_ON} (hosted_ok=${HOSTED_OK})"
          }
          # Runs on ANY exit, including an unexpected crash, so an output is
          # always written.
          trap finish EXIT
          # Fork PRs cannot use self-hosted runners (GitHub refuses to run fork
          # code on them) and never receive repo secrets, so GitHub-hosted
          # ubuntu is both the only option and the secure one. Also covers a
          # missing token. This is the one non-billing path that goes hosted.
          if [ "${IS_FORK:-}" = "true" ] || [ -z "${BILLING_READ_TOKEN:-}" ]; then
            RUNS_ON="$HOSTED"
            HOSTED_OK=true
            echo "fork PR or no billing token; using GitHub-hosted ubuntu-latest"
            exit 0
          fi
          # If SELF_HOSTED_ENABLED is set, the operator has pinned this repo to
          # the self-hosted mini because GitHub-hosted runners are blocked or
          # undesired here — on these private repos the account's hosted-runner
          # spending limit is reached and hosted jobs fail to start ("The job
          # was not started because ... your spending limit needs to be
          # increased"). Hosted is not a safe target regardless of what billing
          # reports, so stay on the free self-hosted runner. The billing branch
          # below governs repos where hosted IS available (e.g. public repos
          # with free hosted minutes).
          if [ "${SH_ENABLED:-}" = "true" ]; then
            echo "SELF_HOSTED_ENABLED set; GitHub-hosted runners unavailable here — using self-hosted"
            exit 0
          fi
          year="$(date -u +%Y 2>/dev/null)"
          month="$(date -u +%-m 2>/dev/null)"
          [ -n "${year:-}" ] || { echo "date failed; keeping self-hosted"; exit 0; }
          resp="$(curl -sS -m 30 -w '\n%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${BILLING_READ_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/users/kaelys-js/settings/billing/usage?year=${year}&month=${month}" \
            2>/dev/null)"
          code="$(printf '%s' "${resp:-}" | tail -n1)"
          body="$(printf '%s' "${resp:-}" | sed '$d')"
          if [ "${code:-}" != "200" ]; then
            echo "billing HTTP '${code:-none}'; keeping self-hosted"
            exit 0
          fi
          if ! printf '%s' "${body:-}" | jq -e '.usageItems | type == "array"' >/dev/null 2>&1; then
            echo "billing response has no usageItems[]; keeping self-hosted"
            exit 0
          fi
          net="$(printf '%s' "${body}" | jq -r '[.usageItems[] | select(.product == "actions") | (.netAmount // 0)] | add // 0' 2>/dev/null)"
          if ! printf '%s' "${net:-}" | grep -Eq '^-?[0-9]+([.][0-9]+)?$'; then
            echo "unparsable actions netAmount '${net:-}'; keeping self-hosted"
            exit 0
          fi
          if awk -v n="${net}" 'BEGIN { exit !(n + 0 > 0) }'; then
            echo "actions netAmount=${net} > 0 — included minutes exhausted; using self-hosted"
          else
            RUNS_ON="$HOSTED"
            HOSTED_OK=true
            echo "actions netAmount=${net} == 0 — within included minutes; using hosted"
          fi
          exit 0
  sync:
    needs: preflight
    runs-on: ${{ fromJSON(needs.preflight.outputs.runs_on) }}
    steps:
      # GitHub enforces global-per-account uniqueness on deploy-key material.
      # Both `kaelys-js/ttt-studio-cole-30-60-90-plan` (this fork) and
      # `kaelys-js/foundation-registry` (upstream) sit under the same user
      # account, so the template's "same key on both repos" pattern refuses
      # the second install with `key is already in use`. The fork therefore
      # skips the deploy key and runs both remotes over HTTPS using
      # `secrets.GH_TOKEN` (a PAT with `repo` scope on the kaelys-js account).
      # The template stays as-is for the cross-account case it was designed
      # around; this file is the fork-local deviation.
      - name: Checkout fork main
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      # Warm the mise toolchain BEFORE the merge step's inline install.
      # jdx/mise-action activates mise on PATH so subsequent
      # `./bin/mise install` calls (after the merge picks up any upstream
      # tool bumps) run with node + pnpm already resolved. Without the
      # warmup, the merge step's fresh `./bin/mise install` occasionally
      # kicks off `npm install -g` for the npm-backed tools (@taplo/cli,
      # markdownlint-cli2, oxfmt, oxlint) before node's binary lands on
      # PATH, and each fails with `exit code 127`.
      - name: Warm mise toolchain
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          install: true

      - name: Configure git identity
        run: |
          git config user.name "Cole Beuker"
          git config user.email "cole.beuker@ttt.studio"

      - name: Add upstream remote and fetch
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/kaelys-js/foundation-registry.git"
          git fetch upstream main

      - name: Try fast-forward
        id: ff
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Move the ref via `gh api` rather than `git push`. A push would
          # be a fast-forward at the SHA level, but the ambient GITHUB_TOKEN
          # path adds a signed-off-by-actions layer we don't want; a PATCH
          # to /git/refs/heads/main just moves the pointer to the upstream
          # commit, preserving whatever signature (or none) the upstream
          # commit carried. No new commit is created.
          if git merge --ff-only upstream/main; then
            echo "result=ff" >>"$GITHUB_OUTPUT"
            UPSTREAM_HEAD=$(git rev-parse HEAD)
            if [[ "${DRY_RUN}" == "true" ]]; then
              echo "[DRY_RUN] would PATCH refs/heads/main -> ${UPSTREAM_HEAD}"
            else
              gh api -X PATCH /repos/${{ github.repository }}/git/refs/heads/main \
                -f sha="$UPSTREAM_HEAD"
            fi
          else
            echo "result=conflict" >>"$GITHUB_OUTPUT"
          fi

      - name: Create sync branch on non-fast-forward
        if: steps.ff.outputs.result == 'conflict'
        id: branch
        run: |
          git reset --hard origin/main
          UPSTREAM_SHA=$(git rev-parse --short upstream/main)
          # Append the run id so every attempt cuts a FRESH branch name. The
          # repo carries a `non_fast_forward` ruleset that also matches
          # `sync/**`, so a rerun that reused a deterministic name and
          # `--force-with-lease`d over the previous attempt's branch is
          # refused with `Cannot force-push to this branch` (HTTP 422). A
          # per-run-unique name makes the push below a plain create — never a
          # force — so no ruleset can block it.
          BRANCH="sync/upstream-$(date -u +%Y-%m-%d)-${UPSTREAM_SHA}-${{ github.run_id }}"
          echo "branch=${BRANCH}" >>"$GITHUB_OUTPUT"
          git checkout -b "${BRANCH}"

      - name: Merge upstream with fixed conflict rule
        if: steps.ff.outputs.result == 'conflict'
        id: merge
        run: |
          set +e
          git merge --no-ff --no-commit upstream/main
          set -e

          # Upstream-wins (upstream is authoritative). packages/shared and
          # .schemas are the shared library surface; mise.toml/turbo.json track
          # upstream toolchain baseline; doc surfaces (README/CONTRIBUTING/
          # SECURITY/ISSUE_TEMPLATE) track upstream governance.
          for p in \
            packages/shared \
            .schemas \
            mise.toml \
            turbo.json \
            .github/ISSUE_TEMPLATE \
            README.md \
            CONTRIBUTING.md \
            SECURITY.md \
          ; do
            if [ -e "$p" ] || git ls-files -u "$p" | grep -q .; then
              git checkout --theirs -- "$p" 2>/dev/null || true
              git add -A "$p" 2>/dev/null || true
            fi
          done

          # Fork-wins allowlist — generic Option A surface: everything under
          # `packages/products/**` and `apps/**` belongs to the fork (upstream
          # registry doesn't carry product/app code), the fork's `pnpm-lock.yaml`
          # covers those extra products, and both the sync-upstream generated
          # workflow AND its generator template are fork-wins so a future
          # upstream template change cannot silently revert this Option A
          # strategy. Fork-specific divergences beyond this list stay in the
          # concrete `.github/workflows/sync-upstream.yml` fork-wins block.
          for p in \
            packages/products \
            apps \
            pnpm-lock.yaml \
            .github/workflows/sync-upstream.yml \
            packages/shared/config/workflows/sync-upstream.same-owner.template.yml \
          ; do
            if [ -e "$p" ] || git ls-files -u "$p" | grep -q .; then
              # `git checkout --ours` silently no-ops on cleanly-merged files
              # (no merge-stage entry). Use `git checkout HEAD -- <p>` instead:
              # during a merge, HEAD still points at the fork's pre-merge tip,
              # so this restores the fork's version whether the merge was
              # conflicted OR clean (the auto-merged-to-upstream case that
              # PRs #45 + #46 hit on packages/shared/utils/qa/src/schema-check.ts).
              git checkout HEAD -- "$p" 2>/dev/null || true
              git add -A "$p" 2>/dev/null || true
            fi
          done

          # Fallback for remaining unmerged paths — accept upstream (Q2=accept).
          # Also captures `added by them` / `both added` conflicts: any brand-
          # new file upstream introduces lands automatically in the fork,
          # rather than blocking the sync on a hand review.
          while read -r line; do
            [ -z "$line" ] && continue
            p=$(printf '%s' "$line" | awk '{print $NF}')
            [ -z "$p" ] && continue
            git checkout --theirs -- "$p" 2>/dev/null || true
            git add -A "$p" 2>/dev/null || true
          done < <(git ls-files -u | awk '{print $NF}' | sort -u)

          # Gate `./bin/mise install` behind an unresolved-paths check. If the
          # rule-based checkouts above left ANY path unmerged, `./bin/mise
          # install` crashes at src/lockfile.rs:460 with `key with no value,
          # expected \`=\`` the moment mise parses a TOML file carrying
          # `<<<<<<< HEAD` markers (mise.toml, mise.local.toml, mise.lock,
          # and any TOML mise reads). Under the ambient `set -e`, that
          # dropped the workflow before the push + PR-open steps ran, and
          # left the operator with no PR to review. `git ls-files -u` is
          # the definitive unmerged-paths signal: empty means every conflict
          # was resolved by our rule loops, so `./bin/mise install` sees a
          # clean tree. Non-empty means we skip mise entirely and fall
          # through to the marker-commit path below; the human resolves on
          # the opened PR.
          if git ls-files -u | grep -q .; then
            echo "::warning::Unresolved conflict paths outside both allowlists; skipping mise install and pnpm-lock regen, committing marker version for hand review."
          else
            # Regenerate pnpm-lock.yaml against the merged package manifests.
            # `pnpm-lock.yaml` is fork-wins (fork carries products the upstream
            # doesn't, so upstream's lock would miss entries), but the merged
            # tree can pick up upstream's package.json bumps. Without regen,
            # fork CI's `pnpm install --frozen-lockfile` fails on the mismatch.
            # `--lockfile-only` skips actual package downloads; the whole step
            # is a no-op when nothing changed.
            if command -v ./bin/mise >/dev/null; then
              ./bin/mise install
              ./bin/mise exec -- pnpm install --lockfile-only --no-frozen-lockfile
              git add pnpm-lock.yaml
            fi
          fi

          # Empty-diff guard. The rule loops above can resolve every path back
          # to the fork tip (e.g. the whole upstream delta lands in fork-wins
          # paths, or upstream only touched files the fork already matches), so
          # the merge index is byte-identical to `HEAD` and there is genuinely
          # nothing to sync. That is a clean no-op, not a failure: `git commit`
          # would abort with "nothing to commit, working tree clean" and drop
          # the whole run red. Detect it and exit 0 without a PR — a rerun on a
          # later upstream tip will produce a real diff. Signalled via the
          # `noop` output so the push / guard / PR / merge steps below skip.
          if [ -z "$(git status --porcelain)" ]; then
            echo "noop=true" >>"$GITHUB_OUTPUT"
            echo "::notice::Conflict-path resolution is identical to the fork tip; nothing to sync. Treating as a clean no-op (no PR)."
            git merge --abort 2>/dev/null || true
            exit 0
          fi

          # Commit whatever was resolved. If the rule-based checkouts left
          # unmerged paths outside both allowlists, `commit --no-edit` fails;
          # fall through to a commit that captures the working tree with
          # conflict markers so the PR opens for a human to resolve.
          git -c "user.name=Cole Beuker" -c "user.email=cole.beuker@ttt.studio" \
            commit --no-edit || {
              git -c "user.name=Cole Beuker" -c "user.email=cole.beuker@ttt.studio" \
                commit -am "[CONFLICT] sync: upstream merge with unresolved conflicts (needs review)"
            }
          # No `exit ${MERGE_STATUS}` — the docstring's contract is that a
          # conflict PR still opens ("the commit lands with conflict markers,
          # the PR stays open"). Failing this step here would short-circuit
          # Push + PR-open below and leave the operator with nothing to
          # review. Merge cleanliness is reported by the opened PR's own CI.

      - name: Push sync branch
        if: steps.ff.outputs.result == 'conflict' && steps.merge.outputs.noop != 'true'
        run: |
          # Plain `git push` — the branch name carries the run id (see "Create
          # sync branch"), so every attempt is a brand-new ref and the push is
          # always a create, never a force. This repo's `non_fast_forward`
          # ruleset also matches `sync/**`, so a `--force-with-lease` rewrite of
          # an existing sync branch is refused with HTTP 422; a create sidesteps
          # the rule entirely. The commit pushed here IS the PR head verbatim —
          # there is no API re-signing step. The old design re-created this
          # merge commit via `gh api POST /git/commits` and force-updated the
          # ref to earn a `web-flow` Verified badge on the sync branch, but that
          # force-update is exactly what the ruleset now blocks, and it bought
          # nothing: `main` only requires signatures on the commit that LANDS on
          # it, and the squash-merge commit GitHub creates on `main` is already
          # web-flow-signed and Verified.
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "[DRY_RUN] would push origin ${{ steps.branch.outputs.branch }}"
            exit 0
          fi
          git push origin "${{ steps.branch.outputs.branch }}"

      # Hard gate against auto-merge when the sync branch carries conflict
      # markers. Runs post-commit, post-push, BEFORE any `gh pr merge`
      # call. PR #33 on the ttt-studio fork (2026-07-17) squash-merged
      # conflict markers into `main` because the previous guard was gated
      # on `gh pr merge --auto` FAILING — `--auto` succeeded (no required
      # checks on the fork), so the `if !` branch was never entered and
      # the guard never ran. GitHub then auto-merged when CI (which does
      # not itself fail on marker text alone) passed. This step decouples
      # the marker check from any merge call, and the downstream merge
      # step is gated on this step's `conflict_markers` output.
      #
      # Regex: line-start-anchored ERE for the three standard git
      # conflict markers with exactly seven marker characters —
      #   `<<<<<<< <label>`  (ours side)
      #   `=======`          (separator, whole line)
      #   `>>>>>>> <label>`  (theirs side)
      # Line-start anchoring plus the exact repeat count rules out prose
      # and code that mentions angle brackets or equals signs.
      - name: Scan sync branch for conflict markers
        if: steps.ff.outputs.result == 'conflict' && steps.merge.outputs.noop != 'true'
        id: guard
        run: |
          if git grep -q -E '^(<{7} |={7}$|>{7} )' HEAD; then
            FILES=$(git grep -l -E '^(<{7} |={7}$|>{7} )' HEAD | paste -sd ',' -)
            {
              echo "conflict_markers=true"
              echo "marked_files=${FILES}"
            } >>"$GITHUB_OUTPUT"
            echo "::warning::Conflict markers found in: ${FILES}. Auto-merge disabled."
          else
            echo "conflict_markers=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.ff.outputs.result == 'conflict' && steps.merge.outputs.noop != 'true'
        env:
          # `github.token` (the ambient GITHUB_TOKEN) cannot create pull
          # requests: GitHub blocks it with `GitHub Actions is not permitted
          # to create or approve pull requests`. Use the personal PAT
          # (`secrets.GH_TOKEN`, `repo` + `workflow` scope) which is already
          # set on this repo for the refresh workflow.
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # `gh` scans git remotes to decide which repo owns the PR. With
          # both `origin` (this fork) and `upstream` (kaelys-js/foundation-
          # registry, added by the earlier step) registered, it can't guess
          # correctly and errored `Could not resolve to a Repository with
          # the name 'kaelys-js/foundation-registry'`. Pin the repo
          # explicitly so gh stops guessing.
          GH_REPO: ${{ github.repository }}
        run: |
          TITLE="sync: upstream $(date -u +%Y-%m-%d)"
          if [ "${{ steps.guard.outputs.conflict_markers }}" = "true" ]; then
            TITLE="[NEEDS HUMAN REVIEW - DO NOT AUTO-MERGE] ${TITLE}"
          fi
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "[DRY_RUN] would gh pr create --title \"${TITLE}\" --head ${{ steps.branch.outputs.branch }}"
            exit 0
          fi
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "${TITLE}" \
            --body "Automated sync of upstream/main into this fork. Conflict rule: upstream wins under \`packages/shared\` and \`.schemas\`; product and product-workflow paths win locally. If CI passes, this PR auto-merges (squash) and the branch is deleted."

      # Clean-tree path: `--auto` refuses when the PR is in `clean` status
      # — GitHub only enables auto-merge on PRs with pending required
      # checks. A fork without branch protection has none, so a clean
      # sync PR hits "Pull request is in clean status
      # (enablePullRequestAutoMerge)". Fall through to a direct
      # squash-merge in that case, so the flow works on both
      # branch-protected and unprotected forks. This step is skipped
      # entirely when the guard flagged conflict markers, so neither
      # `--auto` nor the direct squash can land dirty content.
      - name: Enable auto-merge on clean sync
        if: steps.ff.outputs.result == 'conflict' && steps.guard.outputs.conflict_markers == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "[DRY_RUN] would gh pr merge --auto (or squash fallback) ${{ steps.branch.outputs.branch }}"
            exit 0
          fi
          if ! gh pr merge \
              "${{ steps.branch.outputs.branch }}" \
              --auto --squash --delete-branch; then
            gh pr merge \
              "${{ steps.branch.outputs.branch }}" \
              --squash --delete-branch
          fi

      # Marker path: leave the PR open for a human, tag it, comment the
      # affected files, then fail the workflow so the incident is visible
      # on the Actions tab. `gh label create --force` is idempotent
      # (repeat runs on the same repo don't fail once the label exists).
      - name: Flag PR for human review on conflict markers
        if: steps.ff.outputs.result == 'conflict' && steps.guard.outputs.conflict_markers == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "[DRY_RUN] would label + comment for conflict markers in: ${{ steps.guard.outputs.marked_files }}"
            exit 0
          fi
          gh label create sync-upstream-conflict \
            --description "sync-upstream produced conflict markers; needs human review" \
            --color d73a4a --force || true
          gh pr edit \
            "${{ steps.branch.outputs.branch }}" \
            --add-label sync-upstream-conflict
          gh pr comment \
            "${{ steps.branch.outputs.branch }}" \
            --body "Conflict markers detected in the merged tree: \`${{ steps.guard.outputs.marked_files }}\`. Auto-merge intentionally disabled — resolve conflicts manually before merging."
          echo "::warning::Sync branch has conflict markers; PR ${{ steps.branch.outputs.branch }} left open for hand review. Not exiting nonzero — a marker-carrying PR is a design outcome, not a workflow failure (reserve exit 1 for actual pipeline errors like network / git / missing-token)."
