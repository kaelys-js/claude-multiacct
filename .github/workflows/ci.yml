---
name: CI

# `on:` is quoted to avoid yamllint's truthy warning — it's the YAML 1.1
# boolean alias for `true`.
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Per-PR concurrency: cancel obsolete PR runs, never cancel main-branch runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Workflow-level least privilege: read-only. Bats tests are hermetic + `qa
# lint` (shellcheck/gitleaks/yamllint) never writes. No job needs an override.
permissions:
  contents: read

jobs:
  qa:
    name: qa lint + qa test
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # jdx/mise-action installs mise + every tool pinned in mise.toml
      # (shellcheck, bats, gitleaks, yq, yamllint, shfmt, markdownlint-cli2,
      # commitlint). Caches to speed up subsequent runs.
      - name: Install mise + pinned toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0

      # qa lint = shellcheck + shfmt --diff + gitleaks + yamllint + markdownlint
      - name: qa lint
        run: bin/claude-multiacct qa lint

      # qa format:check — refuse to merge unformatted shell files (shfmt).
      - name: qa format:check
        run: shfmt -d bin/* lib/*.sh tests/*.bats

      # qa test = hermetic bats suite (all four .bats files).
      # Runs under scratch $HOME (CMA_SKIP_LAUNCHD=1 + CMA_SKIP_AUTO_MIGRATE=1
      # set by each file's setup()), so no live macOS state is touched.
      - name: qa test
        run: bin/claude-multiacct qa test

  # Bash line coverage via `bin/claude-multiacct qa test:coverage` (kcov +
  # bats) is intentionally not gated in CI. Two hard infrastructure
  # constraints combine:
  #   1. kcov on macos-14 hangs under SIP when it tries to PTRACE_ATTACH
  #      into the bats-spawned subprocesses. A macos-14 coverage job wedges
  #      the runner until the 6h ceiling.
  #   2. kcov on ubuntu-latest / ubuntu-22.04 works reliably, but the bats
  #      suite invokes macOS-only tools (`ditto`, `codesign`, `launchctl`)
  #      via lib/build-clone-app.sh + lib/install-launchd.sh. On Linux
  #      those tools are missing and every add-instance test aborts before
  #      it reaches the code paths that matter.
  # The `qa test:coverage` command works LOCALLY on a macOS box that has
  # kcov (`brew install kcov`) + SIP relaxed, and produces the same HTML
  # report as any other kcov run. Wiring it into CI requires either
  # (a) a from-source kcov build with the deadlock-avoidance patch that
  # recent-tip has, plus enough patience for the ~5m build; or (b) a
  # hermetic mac-side test rewrite that stubs ditto/codesign/launchctl at
  # the shell level so the whole suite runs on Linux. Both are open
  # decisions blocked on infra this repo doesn't own; surfaced here as a
  # tracked constraint.
