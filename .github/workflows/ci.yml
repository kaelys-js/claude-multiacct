# yaml-language-server: $schema=../../.schemas/github-workflow.json
# Four or five parallel jobs — wall-time is the slowest job, not the sum. Every
# job sources its toolchain from the repo's own mise (via the vendored bin/mise
# wrapper), so CI uses the exact node/pnpm/linter versions pinned in mise.toml +
# mise.lock — identical to local, no external setup action. Each job is
# self-contained and a required gate (no `if:` outside of `validate`).
# Typecheck (tsc), REUSE license compliance, AND schema instance validation all
# run inside the `lint` job as members of the qa:lint pipeline, so there is no
# separate `types` or `schema` job. The `validate` job runs the record validator
# (`pnpm --filter @foundation/registry validate` — schema + cross-record
# invariants over the governance records); the validator's own types are
# covered by the `lint` job's tsc, so
# they are not re-run. The `validate` job runs only when the registry product
# package is present; a small `detect` job checks for it and exposes an output,
# and `validate` gates on that output via `needs`. GHA does not accept
# `hashFiles()` inside `jobs.<job>.if` (only steps.if), which is why the check
# lives in a step rather than inline on the job. A fork without the registry
# gets 4 real jobs plus the tiny detect probe; upstream + forks that carry the
# registry get 5 real jobs plus detect.
#
# `pnpm ci:local` runs this workflow via nektos/act, which `docker cp`s the
# whole working tree into the container — including the host's darwin-native
# `.mise/installs/` with darwin shebangs. Once inside a linux container those
# binaries can't run, and mise sees the files and skips reinstall. The
# `Drop host .mise` step below removes that pollution before the cache
# restore, guarded on `env.ACT` so real GitHub-hosted runs (which never have
# host `.mise` to begin with) skip it.

name: CI

on:
  # Docs-only changes skip real CI here and match ci-noop.yml (mirror path
  # list) which posts required-check successes so branch protection lets
  # docs-only PRs merge without a full CI run. Keep the two lists in sync.
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".editorconfig"
      - ".gitattributes"
      - ".github/CODEOWNERS"
      - ".github/copilot-instructions.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "SUPPORT.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".editorconfig"
      - ".gitattributes"
      - ".github/CODEOWNERS"
      - ".github/copilot-instructions.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "SUPPORT.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Workflow-level least privilege: read-only. Every job below is a check
# (format/lint/sync/test/validate) — none write to the repo.
permissions:
  contents: read

env:
  CI: "true" # pnpm 11: allow non-interactive node_modules rebuild

jobs:
  detect:
    name: detect
    # Route to the kaelys-mac-mini self-hosted runner when SELF_HOSTED_ENABLED
    # is set on the repo; fall back to ubuntu-latest if the mini is down or
    # the escape hatch is flipped off. See docs/self-hosted-runner.md in
    # kaelys-js-infra for the fleet-wide rationale.
    runs-on: ${{ vars.SELF_HOSTED_ENABLED == 'true' && fromJSON('["self-hosted","kaelys-mac-mini"]') || 'ubuntu-latest' }}
    timeout-minutes: 2
    outputs:
      has-registry: ${{ steps.check.outputs.has-registry }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - id: check
        name: Detect registry product
        run: |
          if [ -f packages/products/registry/package.json ]; then
            echo "has-registry=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-registry=false" >> "$GITHUB_OUTPUT"
          fi

  format:
    name: format
    runs-on: ${{ vars.SELF_HOSTED_ENABLED == 'true' && fromJSON('["self-hosted","kaelys-mac-mini"]') || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Drop host .mise (act only, see file header)
        if: env.ACT == 'true'
        run: rm -rf .mise
      - name: Restore mise toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml', 'mise.lock') }}
      - name: Expose vendored mise on PATH
        run: |
          ./bin/mise --version >/dev/null 2>&1 || true
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(ls "$PWD"/.mise/mise-* | head -n1)" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install toolchain (mise — node, pnpm, all formatters)
        run: ./bin/mise install
      - name: Install dependencies
        run: ./bin/mise exec -- pnpm install --frozen-lockfile
      - name: Format check
        run: ./bin/mise exec -- pnpm run qa:format:check

  lint:
    name: lint
    runs-on: ${{ vars.SELF_HOSTED_ENABLED == 'true' && fromJSON('["self-hosted","kaelys-mac-mini"]') || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Drop host .mise (act only, see file header)
        if: env.ACT == 'true'
        run: rm -rf .mise
      - name: Restore mise toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml', 'mise.lock') }}
      - name: Expose vendored mise on PATH
        run: |
          ./bin/mise --version >/dev/null 2>&1 || true
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(ls "$PWD"/.mise/mise-* | head -n1)" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install toolchain (mise — node, pnpm, all linters)
        run: ./bin/mise install
      - name: Install dependencies
        run: ./bin/mise exec -- pnpm install --frozen-lockfile
      - name: Lint (strict — zero diagnostics required)
        run: ./bin/mise exec -- pnpm run qa:lint

  sync:
    name: sync
    runs-on: ${{ vars.SELF_HOSTED_ENABLED == 'true' && fromJSON('["self-hosted","kaelys-mac-mini"]') || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Drop host .mise (act only, see file header)
        if: env.ACT == 'true'
        run: rm -rf .mise
      - name: Restore mise toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml', 'mise.lock') }}
      - name: Expose vendored mise on PATH
        run: |
          ./bin/mise --version >/dev/null 2>&1 || true
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(ls "$PWD"/.mise/mise-* | head -n1)" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install toolchain (mise — sync:turbo formats generated JSON via oxfmt)
        run: ./bin/mise install
      - name: Install dependencies
        run: ./bin/mise exec -- pnpm install --frozen-lockfile
      - name: Generated-file drift (versions / turbo / schemas)
        run: ./bin/mise exec -- pnpm run sync:check

  test:
    name: test
    runs-on: ${{ vars.SELF_HOSTED_ENABLED == 'true' && fromJSON('["self-hosted","kaelys-mac-mini"]') || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Drop host .mise (act only, see file header)
        if: env.ACT == 'true'
        run: rm -rf .mise
      - name: Restore mise toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml', 'mise.lock') }}
      - name: Expose vendored mise on PATH
        run: |
          ./bin/mise --version >/dev/null 2>&1 || true
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(ls "$PWD"/.mise/mise-* | head -n1)" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install toolchain (mise — node, pnpm)
        run: ./bin/mise install
      - name: Install dependencies
        run: ./bin/mise exec -- pnpm install --frozen-lockfile
      - name: Tests + coverage gate (per-file thresholds)
        run: ./bin/mise exec -- pnpm run qa:test:coverage

  gates:
    name: gates
    runs-on: ${{ vars.SELF_HOSTED_ENABLED == 'true' && fromJSON('["self-hosted","kaelys-mac-mini"]') || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Drop host .mise (act only, see file header)
        if: env.ACT == 'true'
        run: rm -rf .mise
      - name: Restore mise toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml', 'mise.lock') }}
      - name: Expose vendored mise on PATH
        run: |
          ./bin/mise --version >/dev/null 2>&1 || true
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(ls "$PWD"/.mise/mise-* | head -n1)" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install toolchain (mise — node, pnpm, all gate tools)
        run: ./bin/mise install
      - name: Install dependencies
        run: ./bin/mise exec -- pnpm install --frozen-lockfile
      - name: Gate-integrity meta-tests (every gate fails closed)
        run: ./bin/mise exec -- pnpm run qa:gates

  validate:
    # Only runs when the registry product package is present. The `detect` job
    # above sets `has-registry` by probing the checked-out tree; validate needs
    # detect and gates on that output. Forks without the registry never carry
    # `packages/products/registry/package.json`, so `has-registry == 'false'`
    # skips validate — the identical ci.yml file lives in both upstream and
    # the forks. See the workflow header for the 4-vs-5-jobs consequence.
    needs: detect
    if: needs.detect.outputs.has-registry == 'true'
    name: validate
    runs-on: ${{ vars.SELF_HOSTED_ENABLED == 'true' && fromJSON('["self-hosted","kaelys-mac-mini"]') || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Drop host .mise (act only, see file header)
        if: env.ACT == 'true'
        run: rm -rf .mise
      - name: Restore mise toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml', 'mise.lock') }}
      - name: Expose vendored mise on PATH
        run: |
          ./bin/mise --version >/dev/null 2>&1 || true
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(ls "$PWD"/.mise/mise-* | head -n1)" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install toolchain (mise — node, pnpm)
        run: ./bin/mise install
      - name: Install dependencies
        run: ./bin/mise exec -- pnpm install --frozen-lockfile
      - name: Validate governance records (schema + cross-record invariants)
        run: ./bin/mise exec -- pnpm --filter @foundation/registry validate
