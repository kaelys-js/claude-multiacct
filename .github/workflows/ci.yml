# yaml-language-server: $schema=../../.schemas/github-workflow.json
# Four or five parallel jobs — wall-time is the slowest job, not the sum. Every
# job sources its toolchain from the repo's own mise (via the vendored bin/mise
# wrapper), so CI uses the exact node/pnpm/linter versions pinned in mise.toml +
# mise.lock — identical to local, no external setup action. Each job is
# self-contained and a required gate (no `if:` outside of `validate`).
# Typecheck (tsc), REUSE license compliance, AND schema instance validation all
# run inside the `lint` job as members of the qa:lint pipeline, so there is no
# separate `types` or `schema` job. The `validate` job runs the record validator
# (`pnpm --filter @foundation/registry validate` — schema + cross-record
# invariants over the governance records); the validator's own types are
# covered by the `lint` job's tsc, so
# they are not re-run. The `validate` job runs only when the registry product
# package is present; a small `detect` job checks for it and exposes an output,
# and `validate` gates on that output via `needs`. GHA does not accept
# `hashFiles()` inside `jobs.<job>.if` (only steps.if), which is why the check
# lives in a step rather than inline on the job. A fork without the registry
# gets 4 real jobs plus the tiny detect probe; upstream + forks that carry the
# registry get 5 real jobs plus detect.
#
# `pnpm ci:local` runs this workflow via nektos/act, which `docker cp`s the
# whole working tree into the container — including the host's darwin-native
# `.mise/installs/` with darwin shebangs. Once inside a linux container those
# binaries can't run, and mise sees the files and skips reinstall. The
# `Drop host .mise` step below removes that pollution before the cache
# restore, guarded on `env.ACT` so real GitHub-hosted runs (which never have
# host `.mise` to begin with) skip it.

name: CI

on:
  # Docs-only changes skip real CI here and match ci-noop.yml (mirror path
  # list) which posts required-check successes so branch protection lets
  # docs-only PRs merge without a full CI run. Keep the two lists in sync.
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".editorconfig"
      - ".gitattributes"
      - ".github/CODEOWNERS"
      - ".github/copilot-instructions.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "SUPPORT.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".editorconfig"
      - ".gitattributes"
      - ".github/CODEOWNERS"
      - ".github/copilot-instructions.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "SUPPORT.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Workflow-level least privilege: read-only. Every job below is a check
# (format/lint/sync/test/validate) — none write to the repo.
permissions:
  contents: read

env:
  CI: "true" # pnpm 11: allow non-interactive node_modules rebuild

jobs:
  preflight:
    name: preflight
    # Decide the runner for every downstream job. Runs on the same
    # SELF_HOSTED_ENABLED selection the real jobs used before, so the decider
    # itself always lands on a runner this repo can actually provision: the
    # self-hosted kaelys-mac-mini where SELF_HOSTED_ENABLED is set (the private
    # repos, where GitHub-hosted runners are spending-limit-blocked), else
    # GitHub-hosted ubuntu-latest (the public repos with free hosted minutes).
    # Pinning this job to ubuntu-latest would fail to start on the private
    # repos and skip the whole pipeline.
    #
    # Hosted-first policy: query the account's GitHub Actions billing usage for
    # the current month; the post-discount netAmount summed over the `actions`
    # product stays 0 while included minutes remain and goes positive once
    # overage is billed. netAmount == 0 -> runs_on "ubuntu-latest" (hosted);
    # otherwise the free kaelys-mac-mini self-hosted runner. The step can never
    # fail the job: it defaults to self-hosted and only flips to hosted on an
    # explicit confirmation, always writing an output and exiting 0. hosted_ok
    # mirrors the decision as a boolean for jobs whose hosted runner is not
    # ubuntu-latest (e.g. macOS). See docs/self-hosted-runner.md in
    # kaelys-js-infra for the fleet-wide rationale.
    runs-on: ${{ vars.SELF_HOSTED_ENABLED == 'true' && fromJSON('["self-hosted","kaelys-mac-mini"]') || 'ubuntu-latest' }}
    timeout-minutes: 5
    outputs:
      runs_on: ${{ steps.pick.outputs.runs_on }}
      hosted_ok: ${{ steps.pick.outputs.hosted_ok }}
    steps:
      - name: Select runner by remaining GitHub-hosted minutes
        id: pick
        env:
          BILLING_READ_TOKEN: ${{ secrets.BILLING_READ_TOKEN }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
          SH_ENABLED: ${{ vars.SELF_HOSTED_ENABLED }}
        run: |
          # GitHub invokes this step with `bash -e`; clear every abort-on-error
          # flag so no command can fail the job. A preflight that exits non-zero
          # would skip every downstream job (needs: preflight) and block the PR,
          # so this step MUST always emit a runs_on and exit 0. Default to the
          # free self-hosted runner; only an explicit confirmation flips it.
          set +e
          set +u
          set +o pipefail
          SELF_HOSTED='["self-hosted","kaelys-mac-mini"]'
          HOSTED='"ubuntu-latest"'
          RUNS_ON="$SELF_HOSTED"
          HOSTED_OK=false
          finish() {
            {
              echo "runs_on=${RUNS_ON}"
              echo "hosted_ok=${HOSTED_OK}"
            } >> "$GITHUB_OUTPUT" 2>/dev/null
            echo "preflight selected: ${RUNS_ON} (hosted_ok=${HOSTED_OK})"
          }
          # Runs on ANY exit, including an unexpected crash, so an output is
          # always written.
          trap finish EXIT
          # Fork PRs cannot use self-hosted runners (GitHub refuses to run fork
          # code on them) and never receive repo secrets, so GitHub-hosted
          # ubuntu is both the only option and the secure one. Also covers a
          # missing token. This is the one non-billing path that goes hosted.
          if [ "${IS_FORK:-}" = "true" ] || [ -z "${BILLING_READ_TOKEN:-}" ]; then
            RUNS_ON="$HOSTED"
            HOSTED_OK=true
            echo "fork PR or no billing token; using GitHub-hosted ubuntu-latest"
            exit 0
          fi
          # If SELF_HOSTED_ENABLED is set, the operator has pinned this repo to
          # the self-hosted mini because GitHub-hosted runners are blocked or
          # undesired here — on these private repos the account's hosted-runner
          # spending limit is reached and hosted jobs fail to start ("The job
          # was not started because ... your spending limit needs to be
          # increased"). Hosted is not a safe target regardless of what billing
          # reports, so stay on the free self-hosted runner. The billing branch
          # below governs repos where hosted IS available (e.g. public repos
          # with free hosted minutes).
          if [ "${SH_ENABLED:-}" = "true" ]; then
            echo "SELF_HOSTED_ENABLED set; GitHub-hosted runners unavailable here — using self-hosted"
            exit 0
          fi
          year="$(date -u +%Y 2>/dev/null)"
          month="$(date -u +%-m 2>/dev/null)"
          [ -n "${year:-}" ] || { echo "date failed; keeping self-hosted"; exit 0; }
          resp="$(curl -sS -m 30 -w '\n%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${BILLING_READ_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/users/kaelys-js/settings/billing/usage?year=${year}&month=${month}" \
            2>/dev/null)"
          code="$(printf '%s' "${resp:-}" | tail -n1)"
          body="$(printf '%s' "${resp:-}" | sed '$d')"
          if [ "${code:-}" != "200" ]; then
            echo "billing HTTP '${code:-none}'; keeping self-hosted"
            exit 0
          fi
          if ! printf '%s' "${body:-}" | jq -e '.usageItems | type == "array"' >/dev/null 2>&1; then
            echo "billing response has no usageItems[]; keeping self-hosted"
            exit 0
          fi
          net="$(printf '%s' "${body}" | jq -r '[.usageItems[] | select(.product == "actions") | (.netAmount // 0)] | add // 0' 2>/dev/null)"
          if ! printf '%s' "${net:-}" | grep -Eq '^-?[0-9]+([.][0-9]+)?$'; then
            echo "unparsable actions netAmount '${net:-}'; keeping self-hosted"
            exit 0
          fi
          if awk -v n="${net}" 'BEGIN { exit !(n + 0 > 0) }'; then
            echo "actions netAmount=${net} > 0 — included minutes exhausted; using self-hosted"
          else
            RUNS_ON="$HOSTED"
            HOSTED_OK=true
            echo "actions netAmount=${net} == 0 — within included minutes; using hosted"
          fi
          exit 0
  detect:
    name: detect
    needs: preflight
    runs-on: ${{ fromJSON(needs.preflight.outputs.runs_on) }}
    timeout-minutes: 2
    outputs:
      has-registry: ${{ steps.check.outputs.has-registry }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - id: check
        name: Detect registry product
        run: |
          if [ -f packages/products/registry/package.json ]; then
            echo "has-registry=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-registry=false" >> "$GITHUB_OUTPUT"
          fi

  format:
    name: format
    needs: preflight
    runs-on: ${{ fromJSON(needs.preflight.outputs.runs_on) }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Drop host .mise (act only, see file header)
        if: env.ACT == 'true'
        run: rm -rf .mise
      - name: Restore mise toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml', 'mise.lock') }}
      - name: Expose vendored mise on PATH
        run: |
          ./bin/mise --version >/dev/null 2>&1 || true
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(ls "$PWD"/.mise/mise-* | head -n1)" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install toolchain (mise — node, pnpm, all formatters)
        run: ./bin/mise install
      - name: Install dependencies
        run: ./bin/mise exec -- pnpm install --frozen-lockfile
      - name: Format check
        run: ./bin/mise exec -- pnpm run qa:format:check

  lint:
    name: lint
    needs: preflight
    runs-on: ${{ fromJSON(needs.preflight.outputs.runs_on) }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Drop host .mise (act only, see file header)
        if: env.ACT == 'true'
        run: rm -rf .mise
      - name: Restore mise toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml', 'mise.lock') }}
      - name: Expose vendored mise on PATH
        run: |
          ./bin/mise --version >/dev/null 2>&1 || true
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(ls "$PWD"/.mise/mise-* | head -n1)" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install toolchain (mise — node, pnpm, all linters)
        run: ./bin/mise install
      # The pipx-backed linters (reuse, yamllint, check-jsonschema) install as
      # venvs whose shebangs and internal symlinks are absolute paths into this
      # job's work root. The cached .mise is keyed only on mise.toml/mise.lock,
      # so on the self-hosted runners it can restore under a different per-service
      # work root than the one it was built in, leaving those paths dangling and
      # making `mise exec -- reuse` fail ENOENT. `mise install` skips them (the
      # version dir already exists), so force a reinstall to re-anchor the venvs
      # to the current work root. Cheap, idempotent, self-healing.
      - name: Re-anchor pipx venvs to current work root
        run: ./bin/mise install --force pipx:reuse pipx:check-jsonschema yamllint
      - name: Install dependencies
        run: ./bin/mise exec -- pnpm install --frozen-lockfile
      - name: Lint (strict — zero diagnostics required)
        run: ./bin/mise exec -- pnpm run qa:lint

  sync:
    name: sync
    needs: preflight
    runs-on: ${{ fromJSON(needs.preflight.outputs.runs_on) }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Drop host .mise (act only, see file header)
        if: env.ACT == 'true'
        run: rm -rf .mise
      - name: Restore mise toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml', 'mise.lock') }}
      - name: Expose vendored mise on PATH
        run: |
          ./bin/mise --version >/dev/null 2>&1 || true
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(ls "$PWD"/.mise/mise-* | head -n1)" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install toolchain (mise — sync:turbo formats generated JSON via oxfmt)
        run: ./bin/mise install
      - name: Install dependencies
        run: ./bin/mise exec -- pnpm install --frozen-lockfile
      - name: Generated-file drift (versions / turbo / schemas)
        run: ./bin/mise exec -- pnpm run sync:check

  test:
    name: test
    needs: preflight
    runs-on: ${{ fromJSON(needs.preflight.outputs.runs_on) }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Drop host .mise (act only, see file header)
        if: env.ACT == 'true'
        run: rm -rf .mise
      - name: Restore mise toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml', 'mise.lock') }}
      - name: Expose vendored mise on PATH
        run: |
          ./bin/mise --version >/dev/null 2>&1 || true
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(ls "$PWD"/.mise/mise-* | head -n1)" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install toolchain (mise — node, pnpm)
        run: ./bin/mise install
      - name: Install dependencies
        run: ./bin/mise exec -- pnpm install --frozen-lockfile
      - name: Tests + coverage gate (per-file thresholds)
        run: ./bin/mise exec -- pnpm run qa:test:coverage

  gates:
    name: gates
    needs: preflight
    runs-on: ${{ fromJSON(needs.preflight.outputs.runs_on) }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Drop host .mise (act only, see file header)
        if: env.ACT == 'true'
        run: rm -rf .mise
      - name: Restore mise toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml', 'mise.lock') }}
      - name: Expose vendored mise on PATH
        run: |
          ./bin/mise --version >/dev/null 2>&1 || true
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(ls "$PWD"/.mise/mise-* | head -n1)" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install toolchain (mise — node, pnpm, all gate tools)
        run: ./bin/mise install
      - name: Install dependencies
        run: ./bin/mise exec -- pnpm install --frozen-lockfile
      - name: Gate-integrity meta-tests (every gate fails closed)
        run: ./bin/mise exec -- pnpm run qa:gates

  validate:
    # Only runs when the registry product package is present. The `detect` job
    # above sets `has-registry` by probing the checked-out tree; validate needs
    # detect and gates on that output. Forks without the registry never carry
    # `packages/products/registry/package.json`, so `has-registry == 'false'`
    # skips validate — the identical ci.yml file lives in both upstream and
    # the forks. See the workflow header for the 4-vs-5-jobs consequence.
    needs: [detect, preflight]
    if: needs.detect.outputs.has-registry == 'true'
    name: validate
    runs-on: ${{ fromJSON(needs.preflight.outputs.runs_on) }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Drop host .mise (act only, see file header)
        if: env.ACT == 'true'
        run: rm -rf .mise
      - name: Restore mise toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml', 'mise.lock') }}
      - name: Expose vendored mise on PATH
        run: |
          ./bin/mise --version >/dev/null 2>&1 || true
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(ls "$PWD"/.mise/mise-* | head -n1)" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install toolchain (mise — node, pnpm)
        run: ./bin/mise install
      - name: Install dependencies
        run: ./bin/mise exec -- pnpm install --frozen-lockfile
      - name: Validate governance records (schema + cross-record invariants)
        run: ./bin/mise exec -- pnpm --filter @foundation/registry validate
