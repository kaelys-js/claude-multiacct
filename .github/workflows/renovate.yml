# yaml-language-server: $schema=../../.schemas/github-workflow.json
# Self-hosted Renovate (private repo).
#
# Runs the Renovate CLI on a schedule and on demand. Renovate reads
# renovate.json5 at the repo root and opens/updates PRs against main.
# CI (.github/workflows/ci.yml) validates every PR; patch/minor/digest PRs
# then platform-auto-merge (per renovate.json5), major PRs wait for review.
#
# AUTH: this workflow mints a short-lived GitHub App installation token per run
# via actions/create-github-app-token; no long-lived PAT lives in secrets. The
# App name is `kaelys-js-renovate`, shared with stardust, kaelys-js, and
# claude-multiacct.

name: renovate

"on":
  schedule:
    # 09:00 UTC ~= 01:00–02:00 America/Vancouver — matches renovate.json5's
    # "before 06:00 local" window; the config's own schedule further gates it.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options: [debug, info, warn]

# A rolling Renovate run is single-writer by nature — this group is not
# per-PR; it prevents two Renovate runs stacking on each other.
concurrency:
  group: renovate
  cancel-in-progress: false

# Workflow-level least privilege. All writes go through the App token minted
# below, not GITHUB_TOKEN, so read here is enough.
permissions:
  contents: read

jobs:
  preflight:
    name: preflight
    # Decide the runner for every downstream job. Runs on the same
    # SELF_HOSTED_ENABLED selection the real jobs used before, so the decider
    # itself always lands on a runner this repo can actually provision: the
    # self-hosted kaelys-mac-mini where SELF_HOSTED_ENABLED is set (the private
    # repos, where GitHub-hosted runners are spending-limit-blocked), else
    # GitHub-hosted ubuntu-latest (the public repos with free hosted minutes).
    # Pinning this job to ubuntu-latest would fail to start on the private
    # repos and skip the whole pipeline.
    #
    # Hosted-first policy: query the account's GitHub Actions billing usage for
    # the current month; the post-discount netAmount summed over the `actions`
    # product stays 0 while included minutes remain and goes positive once
    # overage is billed. netAmount == 0 -> runs_on "ubuntu-latest" (hosted);
    # otherwise the free kaelys-mac-mini self-hosted runner. The step can never
    # fail the job: it defaults to self-hosted and only flips to hosted on an
    # explicit confirmation, always writing an output and exiting 0. hosted_ok
    # mirrors the decision as a boolean for jobs whose hosted runner is not
    # ubuntu-latest (e.g. macOS). See docs/self-hosted-runner.md in
    # kaelys-js-infra for the fleet-wide rationale.
    runs-on: ${{ vars.SELF_HOSTED_ENABLED == 'true' && fromJSON('["self-hosted","kaelys-mac-mini"]') || 'ubuntu-latest' }}
    timeout-minutes: 5
    outputs:
      runs_on: ${{ steps.pick.outputs.runs_on }}
      hosted_ok: ${{ steps.pick.outputs.hosted_ok }}
    steps:
      - name: Select runner by remaining GitHub-hosted minutes
        id: pick
        env:
          BILLING_READ_TOKEN: ${{ secrets.BILLING_READ_TOKEN }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
          SH_ENABLED: ${{ vars.SELF_HOSTED_ENABLED }}
        run: |
          # GitHub invokes this step with `bash -e`; clear every abort-on-error
          # flag so no command can fail the job. A preflight that exits non-zero
          # would skip every downstream job (needs: preflight) and block the PR,
          # so this step MUST always emit a runs_on and exit 0. Default to the
          # free self-hosted runner; only an explicit confirmation flips it.
          set +e
          set +u
          set +o pipefail
          SELF_HOSTED='["self-hosted","kaelys-mac-mini"]'
          HOSTED='"ubuntu-latest"'
          RUNS_ON="$SELF_HOSTED"
          HOSTED_OK=false
          finish() {
            {
              echo "runs_on=${RUNS_ON}"
              echo "hosted_ok=${HOSTED_OK}"
            } >> "$GITHUB_OUTPUT" 2>/dev/null
            echo "preflight selected: ${RUNS_ON} (hosted_ok=${HOSTED_OK})"
          }
          # Runs on ANY exit, including an unexpected crash, so an output is
          # always written.
          trap finish EXIT
          # Fork PRs cannot use self-hosted runners (GitHub refuses to run fork
          # code on them) and never receive repo secrets, so GitHub-hosted
          # ubuntu is both the only option and the secure one. Also covers a
          # missing token. This is the one non-billing path that goes hosted.
          if [ "${IS_FORK:-}" = "true" ] || [ -z "${BILLING_READ_TOKEN:-}" ]; then
            RUNS_ON="$HOSTED"
            HOSTED_OK=true
            echo "fork PR or no billing token; using GitHub-hosted ubuntu-latest"
            exit 0
          fi
          # If SELF_HOSTED_ENABLED is set, the operator has pinned this repo to
          # the self-hosted mini because GitHub-hosted runners are blocked or
          # undesired here — on these private repos the account's hosted-runner
          # spending limit is reached and hosted jobs fail to start ("The job
          # was not started because ... your spending limit needs to be
          # increased"). Hosted is not a safe target regardless of what billing
          # reports, so stay on the free self-hosted runner. The billing branch
          # below governs repos where hosted IS available (e.g. public repos
          # with free hosted minutes).
          if [ "${SH_ENABLED:-}" = "true" ]; then
            echo "SELF_HOSTED_ENABLED set; GitHub-hosted runners unavailable here — using self-hosted"
            exit 0
          fi
          year="$(date -u +%Y 2>/dev/null)"
          month="$(date -u +%-m 2>/dev/null)"
          [ -n "${year:-}" ] || { echo "date failed; keeping self-hosted"; exit 0; }
          resp="$(curl -sS -m 30 -w '\n%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${BILLING_READ_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/users/kaelys-js/settings/billing/usage?year=${year}&month=${month}" \
            2>/dev/null)"
          code="$(printf '%s' "${resp:-}" | tail -n1)"
          body="$(printf '%s' "${resp:-}" | sed '$d')"
          if [ "${code:-}" != "200" ]; then
            echo "billing HTTP '${code:-none}'; keeping self-hosted"
            exit 0
          fi
          if ! printf '%s' "${body:-}" | jq -e '.usageItems | type == "array"' >/dev/null 2>&1; then
            echo "billing response has no usageItems[]; keeping self-hosted"
            exit 0
          fi
          net="$(printf '%s' "${body}" | jq -r '[.usageItems[] | select(.product == "actions") | (.netAmount // 0)] | add // 0' 2>/dev/null)"
          if ! printf '%s' "${net:-}" | grep -Eq '^-?[0-9]+([.][0-9]+)?$'; then
            echo "unparsable actions netAmount '${net:-}'; keeping self-hosted"
            exit 0
          fi
          if awk -v n="${net}" 'BEGIN { exit !(n + 0 > 0) }'; then
            echo "actions netAmount=${net} > 0 — included minutes exhausted; using self-hosted"
          else
            RUNS_ON="$HOSTED"
            HOSTED_OK=true
            echo "actions netAmount=${net} == 0 — within included minutes; using hosted"
          fi
          exit 0
  renovate:
    name: renovate
    # renovatebot/github-action is a JS action that shells out to `docker run
    # ghcr.io/renovatebot/renovate` — the mac-mini has Docker available and the
    # renovate image is multi-arch.
    needs: preflight
    runs-on: ${{ fromJSON(needs.preflight.outputs.runs_on) }}
    timeout-minutes: 30
    steps:
      # Pre-flight FIRST (before checkout): fail loud with a pointer to the
      # runbook if the App secrets aren't set yet. Without this, the workflow
      # would spend a minute checking out + minting a token before failing
      # with an opaque "Bad credentials" from create-github-app-token.
      - name: Verify GitHub App secrets are configured
        env:
          APP_CID: ${{ secrets.RENOVATE_APP_CLIENT_ID }}
          APP_PK: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
        run: |
          if [[ -z "$APP_CID" || -z "$APP_PK" ]]; then
            printf 'Renovate is not configured yet.\n'
            printf '\n'
            printf 'Missing secrets:\n'
            [[ -z "$APP_CID" ]] && printf '  - RENOVATE_APP_CLIENT_ID\n'
            [[ -z "$APP_PK" ]] && printf '  - RENOVATE_APP_PRIVATE_KEY\n'
            exit 1
          fi

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RENOVATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          # No owner:/repositories: — the App is installed only on this repo
          # within the installation, so the token is scoped automatically.

      - name: Run Renovate
        # Pinned to a tag + digest, like the rest of our workflow deps.
        # Renovate keeps this line current via the github-actions manager.
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          token: ${{ steps.app-token.outputs.token }}
          configurationFile: renovate.json5
        env:
          # Restrict to this repo; the token scopes it too, but be explicit.
          # github.repository resolves to `<owner>/<repo>` — the same repo
          # renovate.json5 lives in, so fork and upstream share this file.
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Honor the schedule in renovate.json5; on manual dispatch, ignore
          # it so an on-demand run actually does work.
          # yamllint disable-line rule:line-length
          RENOVATE_FORCE: ${{ github.event_name == 'workflow_dispatch' && '{"schedule":null}' || '' }}
          LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
