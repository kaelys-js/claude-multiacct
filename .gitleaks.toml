# Secret-scanning standard for foundation-registry — gitleaks. Run via
# `pnpm qa:lint` (staged scan in the pre-commit path; whole-tree `gitleaks dir .`
# in pre-push/CI). Extends gitleaks' built-in ruleset rather than replacing it,
# then narrows false positives with a reviewed allowlist.

[extend]
useDefault = true

[[allowlists]]
description = "Lockfiles and vendored assets — integrity hashes, not secrets."
paths = [
	'''pnpm-lock\.yaml$''',
	'''mise\.lock$''',
	'''(^|/)\.mise/''',
	'''(^|/)node_modules/''',
	'''\.min\.(js|css)$''',
]

[[allowlists]]
description = "Obvious non-secret placeholders used in docs and examples."
regexTarget = "match"
regexes = ['''(?i)(example|sample|dummy|placeholder|changeme|your[-_]?(token|key|secret))''']
