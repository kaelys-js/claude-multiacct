# yaml-language-server: $schema=./.schemas/lefthook.json
#
# https://github.com/evilmartians/lefthook
#

# Hook execution model:
#   piped: true  — commands run in priority order; a failure stops the pipeline
#   priority: N  — lower runs first; same priority runs in parallel
#   stage_fixed  — auto-stages files modified by the command
#
# Override locally via lefthook-local.yml (not committed).
# Skip all hooks: LEFTHOOK=0 git commit ...

# ─── Commit Message ──────────────────────────────────────────────────────────

commit-msg:
  commands:
    validate:
      run: pnpm lint:commit --edit {1}
      fail_text: "Commit message does not follow conventional commits. See https://www.conventionalcommits.org"

# ─── Pre-Commit ──────────────────────────────────────────────────────────────
# Runs on every commit. Keep this fast — lint and format only, no tests or builds.
# Pipeline: format (p1) → lint (p2).
#
# Both are SINGLE commands covering every file type: the TypeScript QA runner
# (scripts/qa, driven by the valibot-validated tool registry) fans out to each
# formatter/linter via mise, filtering the staged file list per tool. Adding a
# tool = one entry in scripts/qa/registry.ts, not a change here.

pre-commit:
  piped: true
  commands:
    # p1 — Format staged files, then re-stage what changed.
    format:
      priority: 1
      run: bin/mise exec -- node scripts/qa/format.ts {staged_files}
      stage_fixed: true
      fail_text: "Formatting failed. Run 'pnpm qa:format' to fix."
    # p2 — Lint staged files after formatting settles them.
    lint:
      priority: 2
      run: bin/mise exec -- node scripts/qa/lint.ts {staged_files}
      fail_text: "Linting failed. Run 'pnpm qa:lint' to see failures."

# ─── Pre-Push ────────────────────────────────────────────────────────────────
# Thorough, whole-project validation before code leaves the machine. Pre-commit
# handles fast staged-file format+lint; pre-push runs the rest of the pipeline
# that needs the full project graph, not just the staged diff.
# Pipeline: sync-drift (p0) → lint (p1) → format-check (p2)
# Whole-project typecheck (tsc), REUSE license compliance, AND schema instance
# validation are members of the `qa:lint` pipeline now (schema-check runs as the
# `wholeRepoOnly` `schema` tool), so the p1 lint step covers them — no separate
# schema step.

pre-push:
  piped: true
  commands:
    # p0 — Drift gate: the same generated-file drift checks CI's `sync` job runs
    # (versions/turbo/schemas --check). Catches a forgotten regen LOCALLY so CI
    # never reds unexpectedly. Cheap and fail-fast, so it runs first.
    # `sync:schemas` is network-resilient (an unreachable upstream warns + passes,
    # it can't fail an offline push — only a reachable content diff is drift).
    sync-drift:
      priority: 0
      run: pnpm sync:check
      fail_text: "Generated-file drift. Run 'pnpm sync' to regenerate (versions/turbo/schemas)."
    # p1 — Whole-repo lint (every tool over every tracked file). This includes
    # the whole-project typecheck (tsc --noEmit), REUSE license compliance
    # (reuse lint), and schema instance validation (the `wholeRepoOnly` `schema`
    # tool) — all members of the qa:lint pipeline.
    lint:
      priority: 1
      run: pnpm qa:lint
      fail_text: "Linting failed. Run 'pnpm qa:lint' to see failures."
    # p2 — Whole-repo format check (non-zero if anything is unformatted).
    format-check:
      priority: 2
      run: pnpm qa:format:check
      fail_text: "Formatting drift. Run 'pnpm qa:format' to fix."

# ─── Post-Checkout / Post-Merge ──────────────────────────────────────────────
# Keep the working tree consistent after branch switches and merges:
#   deps — reinstall from lockfile in case dependencies changed
#   sync — regenerate derived files (.nvmrc, package.json engines, .schemas,
#          turbo.json) when mise.toml changed.
#
# `deps` runs unconditionally: `pnpm install --frozen-lockfile` is idempotent
# and cheap when nothing changed. `sync` is delegated to scripts/sync/auto.ts,
# which self-gates on a content hash of mise.toml (marker at .mise/.sync-hash):
# it runs the full sync only when the file changed and is a fast no-op otherwise.

post-checkout:
  commands:
    deps:
      run: pnpm install --frozen-lockfile
    sync:
      run: node scripts/sync/auto.ts

post-merge:
  commands:
    deps:
      run: pnpm install --frozen-lockfile
    sync:
      run: node scripts/sync/auto.ts
