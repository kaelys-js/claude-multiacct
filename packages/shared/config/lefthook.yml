# yaml-language-server: $schema=../../../.schemas/lefthook.json
#
# https://github.com/evilmartians/lefthook
#

# Hook execution model:
#   piped: true  — commands run in priority order; a failure stops the pipeline
#   priority: N  — lower runs first; same priority runs in parallel
#   stage_fixed  — auto-stages files modified by the command
#
# Override locally via lefthook-local.yml (not committed).
#
# GATES ARE UNSKIPPABLE. Do NOT set LEFTHOOK=0, LEFTHOOK_EXCLUDE=<hook>, or
# push with --no-verify. If a gate fails, the correct response is to fix the
# failing check, not to skip it. See MEMORY: feedback_coverage_gate_bypass.md.
#
# Two layers enforce this:
#   1. A `no-bypass` command at priority 0 of every stage inspects the
#      environment and hard-fails on a detected bypass attempt.
#   2. The SAME check is inlined at the head of every real gate below. Layer 1
#      alone is defeatable: `LEFTHOOK_EXCLUDE=no-bypass` excludes the guard
#      command by name before it runs. When that happens the real gates still
#      carry the check, so the push/commit still fails closed. To silence layer
#      2 you would have to exclude every gate in the stage by name, which leaves
#      nothing running — the same posture as disabling the hook outright.
#
# One vector this config cannot catch: `LEFTHOOK=0`. lefthook's own installed
# `.git/hooks/*` wrapper exits 0 on `LEFTHOOK=0` before lefthook (and thus any
# command here) runs, so it is a wrapper concern, not a config one. It is called
# out here so nobody mistakes its absence for an oversight.

# ─── Commit Message ──────────────────────────────────────────────────────────

commit-msg:
  commands:
    no-bypass:
      priority: 0
      run: |
        if [ -n "$LEFTHOOK_EXCLUDE" ] || [ "$LEFTHOOK" = "0" ]; then
          echo "BLOCKED: lefthook gates are unskippable (LEFTHOOK/LEFTHOOK_EXCLUDE set)." >&2
          echo "Fix the failing check; do not bypass. See feedback_coverage_gate_bypass.md." >&2
          exit 1
        fi
      fail_text: "Gate bypass attempted. Fix the failing check, do not skip."
    validate:
      priority: 1
      run: |
        if [ -n "$LEFTHOOK_EXCLUDE" ] || [ "$LEFTHOOK" = "0" ]; then
          echo "BLOCKED: lefthook gates are unskippable (LEFTHOOK/LEFTHOOK_EXCLUDE set)." >&2
          exit 1
        fi
        pnpm lint:commit --edit {1}
      fail_text: "Commit message does not follow conventional commits. See https://www.conventionalcommits.org"

# ─── Pre-Commit ──────────────────────────────────────────────────────────────
# Runs on every commit. Keep this fast — lint and format only, no tests or builds.
# Pipeline: no-bypass (p0) → format (p1) → lint (p2).
#
# Both real steps are SINGLE commands covering every file type: the TypeScript
# QA runner (packages/shared/utils/qa/src, driven by the valibot-validated tool
# registry) fans out to each formatter/linter via mise, filtering the staged
# file list per tool. Adding a tool = one entry in
# packages/shared/utils/qa/src/registry.ts, not a change here.

pre-commit:
  piped: true
  commands:
    # p0 — Bypass guard: hard-fail if the invocation is trying to skip gates.
    no-bypass:
      priority: 0
      run: |
        if [ -n "$LEFTHOOK_EXCLUDE" ] || [ "$LEFTHOOK" = "0" ]; then
          echo "BLOCKED: lefthook gates are unskippable (LEFTHOOK/LEFTHOOK_EXCLUDE set)." >&2
          echo "Fix the failing check; do not bypass. See feedback_coverage_gate_bypass.md." >&2
          exit 1
        fi
      fail_text: "Gate bypass attempted. Fix the failing check, do not skip."
    # p1 — Format staged files, then re-stage what changed.
    format:
      priority: 1
      run: |
        if [ -n "$LEFTHOOK_EXCLUDE" ] || [ "$LEFTHOOK" = "0" ]; then
          echo "BLOCKED: lefthook gates are unskippable (LEFTHOOK/LEFTHOOK_EXCLUDE set)." >&2
          exit 1
        fi
        bin/mise exec -- node packages/shared/utils/qa/src/format.ts {staged_files}
      stage_fixed: true
      fail_text: "Formatting failed. Run 'pnpm qa:format' to fix."
    # p2 — Lint staged files after formatting settles them.
    lint:
      priority: 2
      run: |
        if [ -n "$LEFTHOOK_EXCLUDE" ] || [ "$LEFTHOOK" = "0" ]; then
          echo "BLOCKED: lefthook gates are unskippable (LEFTHOOK/LEFTHOOK_EXCLUDE set)." >&2
          exit 1
        fi
        bin/mise exec -- node packages/shared/utils/qa/src/lint.ts {staged_files}
      fail_text: "Linting failed. Run 'pnpm qa:lint' to see failures."

# ─── Pre-Push ────────────────────────────────────────────────────────────────
# Thorough, whole-project validation before code leaves the machine. Pre-commit
# handles fast staged-file format+lint; pre-push runs the rest of the pipeline
# that needs the full project graph, not just the staged diff.
# Pipeline: no-bypass (p0) → sync-drift (p1) → lint (p2) → format-check (p3) →
# test-unit (p4) → test-coverage (p5)
# Whole-project typecheck (tsc), REUSE license compliance, AND schema instance
# validation are members of the `qa:lint` pipeline now (schema-check runs as the
# `wholeRepoOnly` `schema` tool), so the p1 lint step covers them — no separate
# schema step.

pre-push:
  piped: true
  commands:
    # p0 — Bypass guard (see top-of-file note). Runs before every other gate so a
    # LEFTHOOK_EXCLUDE / LEFTHOOK=0 attempt fails immediately instead of skipping
    # the drift/lint/test/coverage steps below.
    no-bypass:
      priority: 0
      run: |
        if [ -n "$LEFTHOOK_EXCLUDE" ] || [ "$LEFTHOOK" = "0" ]; then
          echo "BLOCKED: lefthook gates are unskippable (LEFTHOOK/LEFTHOOK_EXCLUDE set)." >&2
          echo "Fix the failing check; do not bypass. See feedback_coverage_gate_bypass.md." >&2
          exit 1
        fi
      fail_text: "Gate bypass attempted. Fix the failing check, do not skip."
    # p1 — Drift gate: the same generated-file drift checks CI's `sync` job runs
    # (versions/turbo/schemas --check). Catches a forgotten regen LOCALLY so CI
    # never reds unexpectedly. Cheap and fail-fast, so it runs early.
    # `sync:schemas` is network-resilient (an unreachable upstream warns + passes,
    # it can't fail an offline push — only a reachable content diff is drift).
    sync-drift:
      priority: 1
      run: |
        if [ -n "$LEFTHOOK_EXCLUDE" ] || [ "$LEFTHOOK" = "0" ]; then
          echo "BLOCKED: lefthook gates are unskippable (LEFTHOOK/LEFTHOOK_EXCLUDE set)." >&2
          exit 1
        fi
        pnpm sync:check
      fail_text: "Generated-file drift. Run 'pnpm sync' to regenerate (versions/turbo/schemas)."
    # p2 — Whole-repo lint (every tool over every tracked file). This includes
    # the whole-project typecheck (tsc --noEmit), REUSE license compliance
    # (reuse lint), and schema instance validation (the `wholeRepoOnly` `schema`
    # tool) — all members of the qa:lint pipeline.
    lint:
      priority: 2
      run: |
        if [ -n "$LEFTHOOK_EXCLUDE" ] || [ "$LEFTHOOK" = "0" ]; then
          echo "BLOCKED: lefthook gates are unskippable (LEFTHOOK/LEFTHOOK_EXCLUDE set)." >&2
          exit 1
        fi
        pnpm qa:lint
      fail_text: "Linting failed. Run 'pnpm qa:lint' to see failures."
    # p3 — Whole-repo format check (non-zero if anything is unformatted).
    format-check:
      priority: 3
      run: |
        if [ -n "$LEFTHOOK_EXCLUDE" ] || [ "$LEFTHOOK" = "0" ]; then
          echo "BLOCKED: lefthook gates are unskippable (LEFTHOOK/LEFTHOOK_EXCLUDE set)." >&2
          exit 1
        fi
        pnpm qa:format:check
      fail_text: "Formatting drift. Run 'pnpm qa:format' to fix."
    # p4 — Unit tests (vitest, no coverage). Fast fail on a broken test before the
    # heavier coverage pass.
    test-unit:
      priority: 4
      run: |
        if [ -n "$LEFTHOOK_EXCLUDE" ] || [ "$LEFTHOOK" = "0" ]; then
          echo "BLOCKED: lefthook gates are unskippable (LEFTHOOK/LEFTHOOK_EXCLUDE set)." >&2
          exit 1
        fi
        pnpm qa:test
      fail_text: "Tests failed. Run 'pnpm test' to see failures."
    # p5 — Coverage gate: `vitest run --coverage` exits non-zero below the per-file
    # thresholds in vitest.config.ts, blocking the push on undertested code.
    test-coverage:
      priority: 5
      run: |
        if [ -n "$LEFTHOOK_EXCLUDE" ] || [ "$LEFTHOOK" = "0" ]; then
          echo "BLOCKED: lefthook gates are unskippable (LEFTHOOK/LEFTHOOK_EXCLUDE set)." >&2
          exit 1
        fi
        pnpm qa:test:coverage
      fail_text: "Coverage below threshold. Run 'pnpm test:coverage' to see the gap."

# ─── Post-Checkout / Post-Merge ──────────────────────────────────────────────
# Keep the working tree consistent after branch switches and merges:
#   deps — reinstall from lockfile in case dependencies changed
#   sync — regenerate derived files (.nvmrc, package.json engines, .schemas,
#          turbo.json) when mise.toml changed.
#
# `deps` runs unconditionally: `pnpm install --frozen-lockfile` is idempotent
# and cheap when nothing changed. `sync` is delegated to packages/shared/utils/sync/src/auto.ts,
# which self-gates on a content hash of mise.toml (marker at .mise/.sync-hash):
# it runs the full sync only when the file changed and is a fast no-op otherwise.

post-checkout:
  commands:
    deps:
      # `bin/mise` prepends the current repo/worktree root to
      # `MISE_TRUSTED_CONFIG_PATHS`, so a freshly-created git worktree
      # (whose mise.toml is not yet globally trusted) still boots. The
      # `|| true` swallows first-checkout races where node/pnpm aren't
      # yet installed in the fresh worktree — the deps will be
      # (re-)installed on demand by the first real `pnpm` call.
      run: bin/mise exec -- pnpm install --frozen-lockfile || true
    sync:
      run: bin/mise exec -- node packages/shared/utils/sync/src/auto.ts || true

post-merge:
  commands:
    deps:
      run: bin/mise exec -- pnpm install --frozen-lockfile
    sync:
      run: bin/mise exec -- node packages/shared/utils/sync/src/auto.ts
