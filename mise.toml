#:schema ./.schemas/mise.json
# Matches the mise version vendored by bin/mise (the repo-scoped bootstrap that
# scripts/qa + lefthook + CI all run through), so the pinned wrapper satisfies it.
min_version = "2026.5.0"

[settings]
# Read .nvmrc as Node's version source, kept in lockstep with [tools].node.
idiomatic_version_file_enable_tools = ["node"]
# mise owns pnpm; corepack off.
node.corepack = false
# Explicit installs only.
auto_install = false
# mise.lock: refuse installs whose SHA doesn't match once the lockfile exists.
lockfile = true
experimental = true

[env]
# Workspace-scoped tool installations — all binaries live inside the repo.
MISE_INSTALLS_DIR = "{{config_root}}/.mise/installs"

[tools]
node = "26.4.0"
pnpm = "11.10.0"

# ─── QA toolchain — every linter/formatter this registry uses, pinned here so
# the repo is self-contained: `mise install` gets all of them into
# .mise/installs. The single `qa:lint` / `qa:format` commands (scripts/qa/*)
# run these via `mise exec`, and lefthook + CI call those same commands. mise
# itself is bootstrapped by bin/mise.

# Python — hosts the pipx-backed tools below so they need no system Python.
python = "3.13"

# ── ts/js + json/yaml/md formatting & js/ts lint ─────────────────────
"npm:oxlint" = "1.72.0"
"npm:oxfmt" = "0.57.0"

# ── toml (lint + format) ─────────────────────────────────────────────
"npm:@taplo/cli" = "0.7.0"

# ── yaml (semantic lint; oxfmt owns layout) ──────────────────────────
yamllint = "1.38.0"

# ── markdown (lint; oxfmt owns formatting) ───────────────────────────
"npm:markdownlint-cli2" = "0.23.0"

# ── json schema meta-validation ──────────────────────────────────────
"pipx:check-jsonschema" = "0.37.4"

# ── secrets ──────────────────────────────────────────────────────────
"aqua:gitleaks/gitleaks" = "8.30.1"

# ── editorconfig conformance (whitespace / final-newline / eol) ───────
"aqua:editorconfig-checker/editorconfig-checker" = "3.8.0"

# ── licensing / SPDX compliance (REUSE) ──────────────────────────────
# The charset-normalizer extra ships a pure-Python encoding detector so reuse
# doesn't fall back to python-magic, which needs a system libmagic (absent here).
"pipx:reuse" = { version = "6.2.0", extras = "charset-normalizer" }
