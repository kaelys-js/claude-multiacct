# mise.toml — self-contained toolchain pin for claude-multiacct.
# Clone + `mise install` gets shellcheck + bats + gitleaks + shfmt + related
# tools with no machine-global dependency. Docs: https://mise.jdx.dev/configuration.html

min_version = "2026.5.0"

[settings]
experimental = true
auto_install = false
lockfile = true
# Don't trust child .mise.toml files unless allow-listed.

[tools]
# Shell lint — the same version stardust and dotfiles pin.
shellcheck = "0.11.0"
# Hermetic install/uninstall smoke tests.
bats = "1.13.0"
# Secrets scanning — .gitleaks.toml lives at the repo root.
gitleaks = "8.30.1"
# YAML lint for instances.yaml + launchd plist templates.
yamllint = "1.38.0"
# YAML query/edit — read instances.yaml + inject into launchd plist template.
yq = "4.53.3"

# ── Shell formatter (matches the .editorconfig indent/binary-next-line
# preferences). Run via `qa format`; checked in `qa lint` (--diff mode).
shfmt = "3.13.1"

# ── Markdown lint for the README + docs.
"npm:markdownlint-cli2" = "0.23.0"

# ── Node + commitlint (@commitlint/cli via npm-managed pnpm store isn't a
# pattern we want in a bash repo, so use pipx-style npm install via mise).
node = "26.5.0"
"npm:@commitlint/cli" = "21.2.0"
"npm:@commitlint/config-conventional" = "21.2.0"
